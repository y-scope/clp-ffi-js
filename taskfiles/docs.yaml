version: "3"

vars:
  G_DOCS_BUILD_DIR: "{{.G_BUILD_DIR}}/docs"

tasks:
  clean:
    cmds:
      - "rm -rf '{{.G_DOCS_BUILD_DIR}}'"

  build:
    deps: [":init", ":node-modules", ":package"]
    cmds:
      - "npm run docs:build -- --out '{{.G_DOCS_BUILD_DIR}}'"

  serve:
    deps: ["build"]
    cmds:
      - "npm run docs:serve -- '{{.G_DOCS_BUILD_DIR}}'"
