name: "publish-to-npm"

on:
  release:
    types: ["created"]
  workflow_dispatch:

env:
  G_CLP_FFI_JS_DIST_ARTIFACT_NAME: "clp-ffi-js-dist-${{github.sha}}"

permissions: {}

jobs:
  build:
    runs-on: "ubuntu-latest"
    steps:
      - uses: "actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd"  # v6.0.2
        with:
          submodules: "recursive"

      - uses: "./tools/yscope-dev-utils/exports/github/actions/install-go-task"

      - uses: "./tools/yscope-dev-utils/exports/github/actions/print-tool-versions"

      - run: "task package"

      - name: "Upload build artifacts"
        uses: "actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f"  # v7.0.0
        with:
          name: "${{env.G_CLP_FFI_JS_DIST_ARTIFACT_NAME}}"
          path: "dist/"
          if-no-files-found: "error"
          retention-days: 1

  publish-to-npm:
    needs: ["build"]
    runs-on: "ubuntu-latest"
    permissions:
      contents: "read"
      # Required for OIDC trusted publishing.
      id-token: "write"
    steps:
      - uses: "actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd"  # v6.0.2

      - uses: "actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c"  # v8.0.1
        with:
          name: "${{env.G_CLP_FFI_JS_DIST_ARTIFACT_NAME}}"
          path: "dist/"

      - uses: "actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f"  # v6.3.0
        with:
          node-version: 22
          registry-url: "https://registry.npmjs.org/"

      # Trusted publishing requires npm >= 11.5.1 for OIDC token exchange. The exact version is
      # pinned via the `packageManager` field in `package.json`.
      - name: "Install npm with OIDC trusted publishing support"
        run: |-
          corepack enable npm
          corepack install

      # Determine the `dist-tag` for npm publish: use the prerelease identifier
      # (e.g., "beta" from "1.0.0-beta.1") or "latest" for stable versions.
      - name: "Determine npm distribution tag"
        id: "dist-tag"
        run: |
          TAG=$(
            jq -r '
              .version
              | split("-")
              | if length > 1
                then (.[1] | split(".")[0])
                else "latest"
                end
            ' package.json
          )
          echo "tag=${TAG}" >> "${GITHUB_OUTPUT}"

      - run: "npm publish --tag ${{steps.dist-tag.outputs.tag}}"
