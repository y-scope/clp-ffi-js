name: "lint"

on:
  pull_request:
    types: ["opened", "reopened", "synchronize"]
  push:
  schedule:
    # Run daily at 00:15 UTC (the 15 is to avoid periods of high load)
    - cron: "15 0 * * *"
  workflow_dispatch:

permissions: {}

concurrency:
  group: "${{github.workflow}}-${{github.ref}}"
  # Cancel in-progress jobs for efficiency
  cancel-in-progress: true

jobs:
  lint:
    strategy:
      matrix:
        os: ["macos-latest", "ubuntu-latest"]
    runs-on: "${{matrix.os}}"
    steps:
      - uses: "actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd"  # v6.0.2
        with:
          submodules: "recursive"

      - uses: "./tools/yscope-dev-utils/exports/github/actions/install-go-task"

      - uses: "./tools/yscope-dev-utils/exports/github/actions/print-tool-versions"

      - name: "Lint .cpp files (format only)"
        run: "task lint:check-cpp-format"

      - name: "Lint .js files"
        shell: "bash"
        run: "task lint:check-js"

      - name: "Lint .yaml files"
        shell: "bash"
        run: "task lint:check-yaml"
